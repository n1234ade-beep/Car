<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile 3D Racing</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; touch-action: none; font-family: sans-serif; }
        canvas { display: block; }

        /* Mobile Controls */
        .ui-controls {
            position: absolute;
            bottom: 40px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 25px;
            box-sizing: border-box;
            z-index: 100;
        }

        .btn-group { display: flex; gap: 20px; }

        .btn {
            width: 80px;
            height: 80px;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        .btn img { width: 40px; height: 40px; filter: invert(1); }
        .btn:active { background: rgba(255, 255, 255, 0.3); }

        #msg {
            position: absolute;
            top: 10px; left: 10px;
            color: white; background: rgba(0,0,0,0.5);
            padding: 8px; border-radius: 5px; font-size: 12px;
        }
    </style>
</head>
<body>

    <div id="msg">Status: Initializing...</div>

    <div class="ui-controls">
        <!-- Left / Right Group -->
        <div class="btn-group">
            <div class="btn" id="left"><img src="https://img.icons8.com/ios-filled/50/ffffff/left.png"></div>
            <div class="btn" id="right"><img src="https://img.icons8.com/ios-filled/50/ffffff/right.png"></div>
        </div>
        <!-- Brake / Gas Group -->
        <div class="btn-group">
            <div class="btn" id="brake"><img src="https://img.icons8.com/ios-filled/50/ffffff/brake-warning.png"></div>
            <div class="btn" id="gas"><img src="https://img.icons8.com/ios-filled/50/ffffff/speedometer.png"></div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- Core Engine ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 40, 150);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const light = new THREE.AmbientLight(0xffffff, 2);
        scene.add(light);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        // --- Infinite Environment ---
        const roadSegments = [];
        const segLen = 100;
        const totalSegs = 6;

        function createSegment(z) {
            const group = new THREE.Group();
            
            // Road
            const road = new THREE.Mesh(new THREE.PlaneGeometry(20, segLen), new THREE.MeshStandardMaterial({color: 0x222222}));
            road.rotation.x = -Math.PI/2;
            group.add(road);

            // Grass
            const grass = new THREE.Mesh(new THREE.PlaneGeometry(400, segLen), new THREE.MeshStandardMaterial({color: 0x348C31}));
            grass.rotation.x = -Math.PI/2; grass.position.y = -0.1;
            group.add(grass);

            // Trees & Houses
            for(let i=0; i<5; i++) {
                const side = i % 2 === 0 ? 1 : -1;
                const rZ = (Math.random() - 0.5) * segLen;
                
                // Tree
                const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 2), new THREE.MeshStandardMaterial({color: 0x5C4033}));
                const top = new THREE.Mesh(new THREE.ConeGeometry(1.5, 4, 8), new THREE.MeshStandardMaterial({color: 0x0B5345}));
                trunk.position.set(16 * side, 1, rZ); top.position.set(16 * side, 3.5, rZ);
                group.add(trunk, top);

                // Simple House
                const house = new THREE.Mesh(new THREE.BoxGeometry(4, 4, 4), new THREE.MeshStandardMaterial({color: 0x922B21}));
                house.position.set(25 * side, 2, rZ - 5);
                group.add(house);
            }

            group.position.z = z;
            scene.add(group);
            return group;
        }

        for(let i=0; i<totalSegs; i++) roadSegments.push(createSegment(-i * segLen));

        // --- Car Logic (GLB + Procedural Fallback) ---
        let car = new THREE.Group();
        scene.add(car);

        const loader = new GLTFLoader();
        loader.load('car.glb', 
            (gltf) => {
                car.add(gltf.scene);
                car.scale.set(1.5, 1.5, 1.5);
                document.getElementById('msg').innerText = "Model: car.glb loaded";
            },
            undefined,
            () => {
                // FALLBACK: Build a 3D Car if GLB fails
                document.getElementById('msg').innerText = "Status: Using built-in car (GLB failed)";
                const body = new THREE.Mesh(new THREE.BoxGeometry(2, 0.6, 4), new THREE.MeshStandardMaterial({color: 0xff0000}));
                body.position.y = 0.6;
                const glass = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.8, 1.8), new THREE.MeshStandardMaterial({color: 0x222222}));
                glass.position.set(0, 1.2, -0.2);
                car.add(body, glass);
                // Wheels
                const wGeo = new THREE.CylinderGeometry(0.4, 0.4, 0.4);
                const wMat = new THREE.MeshStandardMaterial({color: 0x111111});
                [[-1.1,0.4,1.2], [1.1,0.4,1.2], [-1.1,0.4,-1.2], [1.1,0.4,-1.2]].forEach(p => {
                    const w = new THREE.Mesh(wGeo, wMat); w.rotation.z = Math.PI/2;
                    w.position.set(p[0], p[1], p[2]); car.add(w);
                });
            }
        );

        // --- Mobile Control Handling ---
        const keys = { left: false, right: false, up: false, down: false };
        const bind = (id, key) => {
            const el = document.getElementById(id);
            el.addEventListener('touchstart', (e) => { e.preventDefault(); keys[key] = true; });
            el.addEventListener('touchend', (e) => { e.preventDefault(); keys[key] = false; });
        };
        bind('left', 'left'); bind('right', 'right');
        bind('gas', 'up'); bind('brake', 'down');

        // --- Game Loop ---
        let speed = 0;
        const maxSpeed = 0.4;
        const friction = 0.98;

        function animate() {
            requestAnimationFrame(animate);

            if (keys.up) speed = Math.min(speed + 0.005, maxSpeed);
            if (keys.down) speed = Math.max(speed - 0.02, 0); // Stops, no reverse
            if (!keys.up && !keys.down) speed *= friction;

            car.position.z -= speed * 45;

            if (speed > 0.01) {
                if (keys.left) car.position.x -= 0.12;
                if (keys.right) car.position.x += 0.12;
            }

            // Road Constraints
            if (car.position.x > 8.5) car.position.x = 8.5;
            if (car.position.x < -8.5) car.position.x = -8.5;

            // Infinite Recycling
            roadSegments.forEach(seg => {
                if (car.position.z < seg.position.z - segLen) {
                    seg.position.z -= segLen * totalSegs;
                }
            });

            // Camera Setup
            camera.position.set(car.position.x * 0.4, car.position.y + 4, car.position.z + 10);
            camera.lookAt(car.position.x, car.position.y + 1, car.position.z - 10);

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
